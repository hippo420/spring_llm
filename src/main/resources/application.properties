spring.application.name=spring_ai
server.port=8090

spring.ai.ollama.base-url=http://[::1]:11434
spring.ai.ollama.chat.model=qwen2.5:14b
spring.ai.ollama.chat.options.temperature=0.1
spring.ai.ollama.init.pull-model-strategy=never

# --- Mustache ---
spring.mustache.cache=false

app.chat.history.mode=tiered
app.chat.history.window-size=20
app.chat.history.redis.ttl=7d

# --- Redis  ---
spring.data.redis.host=192.168.50.2
spring.data.redis.port=6379

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

spring.datasource.url=jdbc:postgresql://192.168.50.2:5432/finadm
spring.datasource.username=DEV
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- RAG (pgvector)
spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration


logging.level.root=INFO
logging.level.app.ai=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/spring_ai.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
