spring.application.name=spring_ai
server.port=8090

# Import API_KEY from env file
spring.config.import=optional:file:./api_key.env[.properties]

spring.ai.ollama.base-url=http://[::1]:11434
spring.ai.ollama.chat.model=qwen2.5:14b
spring.ai.ollama.chat.options.temperature=0.1

# Ollama Setting
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.init.pull-model-strategy=never

# Mustache Setting
spring.mustache.cache=false

# using thinking skill from AI-model , AI-model must support thinking
app.chat.thinking.enabled=false

app.chat.history.mode=tiered
app.chat.history.window-size=20
app.chat.history.redis.ttl=7d

# Redis Setting
spring.data.redis.host=192.168.50.2
spring.data.redis.port=6379

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

spring.datasource.url=jdbc:postgresql://192.168.50.2:5432/finadm
spring.datasource.username=DEV
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Setting
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# RAG Embedding Setting
spring.ai.ollama.embedding.model=bge-m3

# Vector Database Setting
spring.ai.vectorstore.pgvector.table-name=chat_doc_chunk
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.initialize-schema=true

# RAG Setting
app.rag.top-k=4
app.rag.similarity-threshold=0.30

# ElasticSearch Setting
app.news.es.url=http://192.168.50.2:9200
app.news.es.index=news_articles

# LOG Setting
logging.level.root=INFO
logging.level.app.ai=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.connections.pooling=ERROR
logging.level.com.zaxxer.hikari=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/spring_ai.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

