spring.application.name=spring_ai
server.port=8090
# --- Ollama (local) ---
spring.ai.ollama.base-url=http://[::1]:11434
spring.ai.ollama.chat.model=qwen2.5:14b
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.init.pull-model-strategy=never

# --- Mustache ---
spring.mustache.cache=false

# --- Chat history (docs/chat-history-tiered-storage-design.md, Stage 1: in-memory) ---
app.chat.history.window-size=20

# --- File upload (attachments) ---
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# --- Database (local PostgreSQL) ---
# TODO: fill in your actual local Postgres credentials/db name below.
spring.datasource.url=jdbc:postgresql://localhost:5432/finadm
spring.datasource.username=DEV
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- RAG (pgvector) not wired up yet (TODO) ---
spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# --- Logging ---
logging.level.root=INFO
logging.level.app.ai=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/spring_ai.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
